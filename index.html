<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAMOZOV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0d1b2a;--navy-card:#1a2d42;--navy-hover:#1f3550;--gold:#b8a98a;--gold-light:#d4c5a9;--gold-dim:#7a6e5a;--text-primary:#e8dcc8;--text-secondary:#8a9bab;--text-dim:#3d5166;--border:rgba(184,169,138,0.15);--border-hover:rgba(184,169,138,0.4)}
html,body{min-height:100%;background:var(--navy)}
body{font-family:'Montserrat',sans-serif;display:flex;flex-direction:column;align-items:center;padding:56px 20px 72px;background:radial-gradient(ellipse at 50% 0%,#1a2d42 0%,#0d1b2a 60%);min-height:100vh}
.avatar-wrap{position:relative;margin-bottom:24px;animation:fadeDown 0.7s ease both}
.avatar-ring{width:108px;height:108px;border-radius:50%;border:1.5px solid var(--gold);padding:4px;display:flex;align-items:center;justify-content:center}
.avatar-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block}
.avatar-dot{position:absolute;bottom:6px;right:6px;width:12px;height:12px;border-radius:50%;background:#4caf7d;border:2px solid var(--navy)}
.name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;letter-spacing:.25em;color:var(--text-primary);text-transform:uppercase;text-align:center;margin-bottom:6px;animation:fadeDown 0.7s 0.1s ease both}
.bio{font-size:10px;font-weight:400;letter-spacing:.22em;color:var(--gold-dim);text-transform:uppercase;text-align:center;margin-bottom:32px;animation:fadeDown 0.7s 0.15s ease both}
.divider{display:flex;align-items:center;gap:12px;width:100%;max-width:380px;margin-bottom:32px;animation:fadeDown 0.6s 0.2s ease both}
.divider::before,.divider::after{content:'';flex:1;height:.5px;background:var(--border)}
.divider-diamond{width:5px;height:5px;border:.5px solid var(--gold-dim);transform:rotate(45deg);flex-shrink:0}
.links{width:100%;max-width:380px;display:flex;flex-direction:column;gap:10px}
.section-label{font-size:9px;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;padding-left:2px;margin-top:6px;margin-bottom:2px}
.btn{display:flex;align-items:center;gap:14px;padding:13px 18px;border-radius:10px;background:var(--navy-card);border:.5px solid var(--border);color:var(--text-primary);font-family:'Montserrat',sans-serif;font-size:13px;font-weight:400;letter-spacing:.05em;cursor:pointer;text-decoration:none;transition:background .2s,border-color .2s,transform .12s;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(184,169,138,0.04),transparent);opacity:0;transition:opacity .3s}
.btn:hover{background:var(--navy-hover);border-color:var(--border-hover);transform:translateY(-2px)}
.btn:hover::before{opacity:1}
.btn:active{transform:scale(0.98) translateY(0)}
.btn-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ig-icon{background:rgba(184,169,138,0.08);color:var(--gold)}
.tg-icon{background:rgba(91,164,207,0.1);color:#5ba4cf}
.ph-icon{background:rgba(100,190,130,0.1);color:#64be82}
.btn-text{flex:1}
.btn-main{display:block;font-size:13px;color:var(--text-primary)}
.btn-sub{display:block;font-size:11px;color:var(--text-secondary);margin-top:1px;letter-spacing:.03em}
.btn-arrow{color:var(--text-dim);font-size:18px;line-height:1;flex-shrink:0}
.footer{margin-top:52px;font-size:10px;letter-spacing:.14em;color:var(--text-dim);text-transform:uppercase;text-align:center;animation:fadeUp 0.7s 0.6s ease both}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.btn:nth-child(1){animation:fadeDown .55s .25s ease both}
.btn:nth-child(2){animation:fadeDown .55s .32s ease both}
.btn:nth-child(3){animation:fadeDown .55s .39s ease both}
.btn:nth-child(4){animation:fadeDown .55s .46s ease both}
svg{display:block}
@media(max-width:440px){body{padding:44px 16px 60px}.name{font-size:24px}}
</style>
</head>
